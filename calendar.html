<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar · Valen Wei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    nav a { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 300; letter-spacing: 0.08em; }
    h1   { font-family: 'Playfair Display', serif; }
    .city-tag { display:inline-flex; align-items:center; gap:3px; font-size:13px; line-height:1.3; padding:3px 9px 3px 10px; border-radius:3px; margin:2px 2px 0 0; white-space:nowrap; cursor:default; }
    .city-tag .rm { opacity:0; transition:opacity .15s; cursor:pointer; font-size:14px; line-height:1; margin-left:1px; }
    .city-tag:hover .rm { opacity:0.6; }
    .city-tag:hover .rm:hover { opacity:1; }
    .add-btn { opacity:0; transition:opacity .15s; }
    .cell-wrap:hover .add-btn { opacity:1; }
    #search-input:focus { outline:none; }
    .result-item { cursor:pointer; padding:9px 16px; font-size:14px; display:flex; align-items:baseline; gap:8px; }
    .result-item:hover { background:#f5f2ef; }
    .yr-col { font-family:'Inter',sans-serif; font-weight:500; font-size:15px; color:#8a7060; letter-spacing:.18em; text-transform:uppercase; }
    .mth-col { font-family:'Inter',sans-serif; font-weight:500; font-size:12px; color:#b0a090; padding-right:16px; text-align:right; vertical-align:top; padding-top:15px; white-space:nowrap; letter-spacing:.18em; text-transform:uppercase; }
  </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen">

  <!-- Nav -->
  <nav class="fixed top-0 w-full bg-stone-50/90 backdrop-blur-sm z-10 border-b border-stone-200">
    <div class="max-w-5xl mx-auto px-6 py-4 flex justify-center items-center gap-8 text-sm text-stone-500 font-light">
      <a href="index.html"   class="hover:text-stone-800 transition-colors">Home</a>
      <a href="vlog.html" class="hover:text-stone-800 transition-colors">Vlog</a>
      <a href="story.html" class="hover:text-stone-800 transition-colors">Journey</a>
      <a href="calendar.html" class="text-stone-800 font-medium">Calendar</a>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 pb-24" style="padding-top:70px;">
    <div class="overflow-x-auto" id="cal-root"></div>
  </main>

  <!-- City picker -->
  <div id="overlay" class="hidden fixed inset-0 bg-black/10 z-50 flex items-start justify-center pt-40" onclick="closePicker()">
    <div class="bg-white border border-stone-200 shadow-xl rounded-sm w-80 overflow-hidden" onclick="event.stopPropagation()">
      <div class="px-4 py-3 border-b border-stone-100 flex items-center gap-2">
        <svg class="w-3.5 h-3.5 text-stone-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>

      </div>
      <div id="search-results" class="max-h-72 overflow-y-auto"></div>
    </div>
  </div>

  <footer class="border-t border-stone-200">
    <div class="max-w-5xl mx-auto px-6 py-8 flex justify-between items-center text-xs text-stone-300 font-light">

    </div>

  let h = 0;

// ── State ──────────────────────────────────────────────────────────────────
let data = {};
let activePicker = null;

function save() {
  localStorage.setItem('nomad-calendar-v2', JSON.stringify(data));
}

function getYears() {
  const now = new Date().getFullYear();
  const ks  = Object.keys(data).map(k => +k.split('-')[0]);
  const min = Math.min(2024, ...ks);
  const max = Math.max(now, ...ks);
  return Array.from({length: max - min + 1}, (_, i) => min + i);
}

// ── Render ─────────────────────────────────────────────────────────────────
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function render() {
  const years = getYears();
  let h = `<table class="border-collapse" style="min-width:${180 + years.length * 170}px">`;

  // header
  h += '<thead><tr><th class="w-14 pb-4"></th>';
  years.forEach(y => {
    h += `<th class="pb-4 yr-col text-center px-2" style="min-width:170px;">${y}</th>`;
  });
  h += '</tr></thead><tbody>';

  MONTHS.forEach((m, mi) => {
    h += '<tr>';
    h += `<td class="mth-col">${m}</td>`;
    years.forEach(y => {
      const key   = `${y}-${mi + 1}`;
      const items = data[key] || [];
      h += `<td class="p-1 align-top">`;
      h += `<div class="cell-wrap min-h-[44px] rounded-sm p-1.5 flex flex-wrap content-start relative" style="background:#f9f8f7;">`;
      items.forEach((e, ci) => {
        const p = palette(e.country);
        h += `<span class="city-tag" style="background:${p.bg};color:${p.tx};">`
           + e.city
           + `<span class="rm" onclick="removeCity('${key}',${ci})">×</span>`
           + `</span>`;
      });
      h += `<button class="add-btn text-stone-300 hover:text-stone-500 text-base leading-none px-1 transition-colors" onclick="openPicker('${key}')">+</button>`;
      h += `</div></td>`;
    });
    h += '</tr>';
  });

  h += '</tbody></table>';
  document.getElementById('cal-root').innerHTML = h;
}

// ── Picker ─────────────────────────────────────────────────────────────────
function openPicker(key) {
  activePicker = key;
  document.getElementById('overlay').classList.remove('hidden');
  const inp = document.getElementById('search-input');
  inp.value = '';
  filterCities();
  inp.focus();
}

function closePicker() {
  document.getElementById('overlay').classList.add('hidden');
  activePicker = null;
}

function toTitleCase(str) {
  return str.replace(/\b\w/g, c => c.toUpperCase());
}

function filterCities() {
  const q   = document.getElementById('search-input').value.toLowerCase().trim();
  const res = document.getElementById('search-results');

  let list = q
    ? WORLD_CITIES.filter(([c, co]) => c.toLowerCase().includes(q) || co.toLowerCase().includes(q))
    : WORLD_CITIES.slice(0, 60);

  if (list.length === 0) {
    const titled = toTitleCase(q);
    const esc = titled.replace(/'/g, "\\'");
    res.innerHTML = `<div class="result-item text-stone-400" onclick="addCity('${esc}','Other')">Add "${titled}"</div>`;
    return;
  }

  res.innerHTML = list.slice(0, 100).map(([city, country]) => {
    const p   = palette(country);
    const ec  = city.replace(/'/g,"\\'");
    const eco = country.replace(/'/g,"\\'");
    return `<div class="result-item" onclick="addCity('${ec}','${eco}')">
      <span class="w-2 h-2 rounded-full flex-shrink-0 inline-block mr-1" style="background:${p.tx};opacity:.6;margin-bottom:1px;"></span>
      <span class="text-stone-700">${city}</span>
      <span class="text-stone-400 text-xs">${country}</span>
    </div>`;
  }).join('');
}

function addCity(city, country) {
  if (!activePicker) return;
  if (!data[activePicker]) data[activePicker] = [];
  if (!data[activePicker].find(e => e.city === city)) {
    data[activePicker].push({city, country});
    save();
    render();
  }
  closePicker();
}

function removeCity(key, idx) {
  data[key].splice(idx, 1);
  if (data[key].length === 0) delete data[key];
  save();
  render();
}

// ── Keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePicker();
  if (e.key === 'Enter' && activePicker) {
    const first = document.querySelector('#search-results .result-item');
    if (first) first.click();
  }
});

// ── Init ───────────────────────────────────────────────────────────────────
(function init() {
  const saved = localStorage.getItem('nomad-calendar-v2');
  data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  render();
})();
</script>
