    body { font-family: 'Inter', sans-serif; }

    .deco-leaf-a, .deco-leaf-b, .deco-leaf-c, .deco-leaf-d { filter: drop-shadow(0 3px 8px rgba(0,0,0,0.06)); }
    @keyframes fallLeaf {
      0%   { transform: translateY(-60px) translateX(0px);    opacity: 0; }
      8%   { opacity: 0.85; }
      28%  { transform: translateY(28vh)  translateX(48px); }
      52%  { transform: translateY(52vh)  translateX(-30px); }
      76%  { transform: translateY(76vh)  translateX(56px);  opacity: 0.85; }
      92%  { opacity: 0; }
      100% { transform: translateY(112vh) translateX(18px);   opacity: 0; }
    }
    @keyframes fallLeaf2 {
      0%   { transform: translateY(-60px) translateX(0px);    opacity: 0; }
      8%   { opacity: 0.75; }
      35%  { transform: translateY(35vh)  translateX(-52px); }
      60%  { transform: translateY(60vh)  translateX(28px); }
      82%  { transform: translateY(82vh)  translateX(-44px);  opacity: 0.75; }
      92%  { opacity: 0; }
      100% { transform: translateY(112vh) translateX(-20px);  opacity: 0; }
    }
    .fall-leaf { position: absolute; top: 0; pointer-events: none; will-change: transform; }

  </style>

  <!-- Falling leaves overlay -->
  <div id="falling-leaves" style="position:fixed; inset:0; pointer-events:none; z-index:5; overflow:hidden;"></div>

  <script>
    (function() {
      const layers = ['leaf-layer-a','leaf-layer-b','leaf-layer-c','leaf-layer-d'].map(id => document.getElementById(id));
      const ns = 'http://www.w3.org/2000/svg';
      const colors = ['#7ab89a','#6aaa8a','#8cc4a4','#5a9e7e','#a4c4ba','#8cb4c6','#b5c9a8','#9ac4aa','#6888a8','#a8c89e','#7eb8b0','#c4d8b8'];

      // [x1,y1, x2,y2, scatter, weight]
      const branches = [
        // main canopy
        [497,345, 222,151, 110, 5],
        [497,323, 289,118,  95, 5],
        [498,312, 396,108,  85, 4],
        [500,310, 450, 55,  80, 4],
        [502,312, 604,108,  85, 4],
        [503,323, 711,118,  95, 5],
        [503,345, 778,151, 110, 5],
        // upper terminal
        [450, 55, 344,  8,  75, 3],
        [450, 55, 556, 10,  75, 3],
        [396,108, 195, 12,  70, 3],
        [604,108, 805, 12,  70, 3],
        [289,118, 162, 50,  72, 3],
        [162, 50,  55, 18,  60, 2],
        [711,118, 838, 50,  72, 3],
        [838, 50, 945, 18,  60, 2],
        // sub-branches
        [311,194, 244,262,  65, 2],
        [222,151, 148,202,  60, 2],
        [222,151, 166, 96,  58, 2],
        [378,183, 326,250,  58, 2],
        [289,118, 210, 88,  58, 2],
        [478,172, 432,238,  58, 2],
        [622,183, 674,250,  58, 2],
        [711,118, 790, 88,  58, 2],
        [689,194, 756,262, 65, 2],
        [778,151, 852,202, 60, 2],
        [778,151, 834, 96, 58, 2],
      ];

      const totalW = branches.reduce((s,b) => s + b[5], 0);
      const TOTAL = 2345;

      let seed = 9876543;
      function r() {
        seed = (seed * 1664525 + 1013904223) >>> 0;
        return seed / 4294967295;
      }

      branches.forEach(([x1,y1,x2,y2,scatter,w]) => {
        const count = Math.round(TOTAL * w / totalW);
        for (let i = 0; i < count; i++) {
          const t  = r();
          const cx = x1 + (x2-x1)*t + (r()-0.5)*scatter*2;
          const cy = y1 + (y2-y1)*t + (r()-0.5)*scatter*2;
          const rx = 5 + r()*12;
          const ry = rx * (0.35 + r()*0.45);
          const rot = r()*180;
          const color = colors[Math.floor(r()*colors.length)];
          const opacity = (0.45 + r()*0.5).toFixed(2);

          const el = document.createElementNS(ns, 'ellipse');
          el.setAttribute('cx', cx.toFixed(1));
          el.setAttribute('cy', cy.toFixed(1));
          el.setAttribute('rx', rx.toFixed(1));
          el.setAttribute('ry', ry.toFixed(1));
          el.setAttribute('fill', color);
          el.setAttribute('opacity', opacity);
          el.setAttribute('transform', `rotate(${rot.toFixed(1)},${cx.toFixed(1)},${cy.toFixed(1)})`);
          layers[Math.floor(r() * 4)].appendChild(el);
        }
      });
    })();

    // ── Falling leaves ──
    (function() {
      const container = document.getElementById('falling-leaves');
      const leafColors = ['#7ab89a','#6aaa8a','#8cc4a4','#5a9e7e','#a4c4ba','#b5c9a8','#9ac4aa','#a8c89e','#7eb8b0'];
      const anims = ['fallLeaf', 'fallLeaf2'];
      const N = 22;

      for (let i = 0; i < N; i++) {
        const color  = leafColors[i % leafColors.length];
        const size   = 13 + Math.random() * 10;
        const left   = Math.random() * 96;
        const dur    = 7 + Math.random() * 9;
        const delay  = -(Math.random() * 16);           // negative = already mid-flight on load
        const anim   = anims[i % 2];
        const angle  = Math.random() * 360;
        const spin   = (Math.random() > 0.5 ? 1 : -1) * (120 + Math.random() * 240);
        const op     = (0.5 + Math.random() * 0.4).toFixed(2);

        const el = document.createElement('div');
        el.className = 'fall-leaf';
        el.style.left = left + '%';
        el.style.animation = `${anim} ${dur.toFixed(1)}s ${delay.toFixed(1)}s linear infinite`;

        el.innerHTML = `<svg width="${size.toFixed(0)}" height="${(size*1.5).toFixed(0)}"
            viewBox="-10 -15 20 30" opacity="${op}"
            style="transform:rotate(${angle.toFixed(0)}deg); display:block;">
          <path d="M0,-14 Q10,-7 10,0 Q10,8 0,14 Q-10,8 -10,0 Q-10,-7 0,-14Z" fill="${color}"/>
          <line x1="0" y1="-14" x2="0" y2="14" stroke="rgba(255,255,255,0.28)" stroke-width="0.9"/>
          <animateTransform attributeName="transform" type="rotate"
            from="0 0 0" to="${spin} 0 0"
            dur="${dur.toFixed(1)}s" repeatCount="indefinite" additive="sum"/>
        </svg>`;

        container.appendChild(el);
      }
    })();
  </script>
