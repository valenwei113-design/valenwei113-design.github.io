<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dwelling · Valen Wei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Playfair Display', serif; }

    .photo-slot {
      background-color: #e7e2dc;
      overflow: hidden;
      position: relative;
    }
    .photo-slot img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .photo-slot:hover img {
      transform: scale(1.04);
    }

  </style>
</head>
<body class="bg-stone-50 text-stone-800">

  <!-- Nav -->
  <nav class="fixed top-0 w-full bg-stone-50/90 backdrop-blur-sm z-10 border-b border-stone-200">
    <div class="max-w-5xl mx-auto px-6 py-4 flex justify-center items-center gap-8 text-sm text-stone-500 font-light">
      <a href="index.html" class="hover:text-stone-800 transition-colors">Home</a>
      <a href="travel.html" class="hover:text-stone-800 transition-colors">Traces</a>
      <a href="hobbies.html" class="hover:text-stone-800 transition-colors">Discovery</a>
      <a href="dwelling.html" class="text-stone-800 font-medium">Dwelling</a>
      <a href="vlog.html" class="hover:text-stone-800 transition-colors">Vlog</a>
      <a href="tips.html" class="hover:text-stone-800 transition-colors">Tips</a>
      <a href="calendar.html" class="hover:text-stone-800 transition-colors">Calendar</a>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 pt-28 pb-24">

    <p class="text-sm tracking-widest uppercase text-stone-400 mb-4">Home & Space</p>
    <h1 class="text-5xl font-bold text-stone-900 mb-4">Dwelling</h1>
    <p class="text-stone-500 font-light mb-16 max-w-lg">Places I passed through briefly, but left pieces of my heart in.</p>

    <!-- ── Chapter 01 · Australia ───────────────────────────────────────────── -->
    <div class="mb-24">

      <!-- Header -->
      <div class="flex items-baseline justify-between mb-8 border-b border-stone-200 pb-5">
        <div>
          <p class="text-xs tracking-widest uppercase text-stone-400 mb-1">01 · Australia</p>
          <h2 class="text-3xl font-bold text-stone-800">Cairns</h2>
        </div>
        <span class="text-sm text-stone-400 font-light">May – Jun 2024</span>
      </div>

      <!-- Photo grid -->
      <div class="grid grid-cols-12 gap-2">

        <!-- Row 1: Gate entrance (hero) + street portrait -->
        <div class="col-span-8">
          <div class="photo-slot w-full" style="height:340px;">
            <img src="cairns/3.JPG" alt="House entrance" />
          </div>
        </div>
        <div class="col-span-4">
          <div class="photo-slot w-full" style="height:340px;">
            <img src="cairns/1.JPG" alt="Neighbourhood street" />
          </div>
        </div>

        <!-- Row 2: House dusk + fairy light night -->
        <div class="col-span-6">
          <div class="photo-slot w-full" style="height:280px;">
            <img src="cairns/2.JPG" alt="House at dusk" />
          </div>
        </div>
        <div class="col-span-6">
          <div class="photo-slot w-full" style="height:280px;">
            <img src="cairns/6.JPG" alt="House with fairy lights" />
          </div>
        </div>

        <!-- Row 3: Grand living room full-width -->
        <div class="col-span-12">
          <div class="photo-slot w-full" style="height:280px;">
            <img src="cairns/4.JPG" alt="Living room" style="object-position: center 40%;" />
          </div>
        </div>

        <!-- Row 4: Night terrace + star map -->
        <div class="col-span-9">
          <div class="photo-slot w-full" style="height:280px;">
            <img src="cairns/7.JPG" alt="Terrace at night" />
          </div>
        </div>
        <div class="col-span-3">
          <div class="photo-slot w-full" style="height:280px;">
            <img src="cairns/8.PNG" alt="Scorpius constellation" />
          </div>
        </div>

        <!-- Row 5: Farewell letter + group -->
        <div class="col-span-4">
          <div class="photo-slot w-full" style="height:400px;">
            <img src="cairns/10.JPG" alt="Farewell letter" />
          </div>
        </div>
        <div class="col-span-8">
          <div class="photo-slot w-full" style="height:400px;">
            <img src="cairns/9.JPG" alt="Housemates" style="object-position: center 20%;" />
          </div>
        </div>

      </div>
      <!-- end photo grid -->

    </div>
    <!-- ── end Chapter 01 ──────────────────────────────────────────────────── -->

    <!-- ── Chapter 02 · New Zealand ────────────────────────────────────────── -->
    <div class="mb-24">

      <!-- Header -->
      <div class="flex items-baseline justify-between mb-8 border-b border-stone-200 pb-5">
        <div>
          <p class="text-xs tracking-widest uppercase text-stone-400 mb-1">02 · New Zealand</p>
          <h2 class="text-3xl font-bold text-stone-800">Christchurch</h2>
        </div>
        <span class="text-sm text-stone-400 font-light">2024</span>
      </div>

      <!-- Photo grid -->
      <div class="grid grid-cols-12 gap-2">

        <!-- Row 1: hero + portrait -->
        <div class="col-span-8">
          <div class="photo-slot w-full" style="height:340px;">
            <img src="new zealand/IMG_9459.JPG" alt="New Zealand" />
          </div>
        </div>
        <div class="col-span-4">
          <div class="photo-slot w-full" style="height:340px;">
            <img src="new zealand/IMG_9460.JPG" alt="New Zealand" />
          </div>
        </div>

        <!-- Row 2: two equal -->
        <div class="col-span-6">
          <div class="photo-slot w-full" style="height:280px;">
            <img src="new zealand/IMG_9455.JPG" alt="New Zealand" />
          </div>
        </div>
        <div class="col-span-6">
          <div class="photo-slot w-full" style="height:280px;">
            <img src="new zealand/IMG_9456.JPG" alt="New Zealand" />
          </div>
        </div>

        <!-- Row 4: large + small -->
        <div class="col-span-9">
          <div class="photo-slot w-full" style="height:280px;">
            <img src="new zealand/IMG_9610.JPG" alt="New Zealand" />
          </div>
        </div>
        <div class="col-span-3">
          <div class="photo-slot w-full" style="height:280px;">
            <img src="new zealand/IMG_9665.JPG" alt="New Zealand" />
          </div>
        </div>

        <!-- Row 5: small + large -->
        <div class="col-span-4">
          <div class="photo-slot w-full" style="height:340px;">
            <img src="new zealand/IMG_9725.JPG" alt="New Zealand" />
          </div>
        </div>
        <div class="col-span-8">
          <div class="photo-slot w-full" style="height:340px;">
            <img src="new zealand/IMG_9712.JPG" alt="New Zealand" />
          </div>
        </div>

        <!-- Row 6: two equal -->
        <div class="col-span-6">
          <div class="photo-slot w-full" style="height:280px;">
            <img src="new zealand/IMG_9698.JPG" alt="New Zealand" />
          </div>
        </div>
        <div class="col-span-6">
          <div class="photo-slot w-full" style="height:280px;">
            <img src="new zealand/455215CD-1A52-4F7D-A538-0DBF5A119D87.JPG" alt="New Zealand" />
          </div>
        </div>

      </div>
      <!-- end photo grid -->

    </div>
    <!-- ── end Chapter 02 ──────────────────────────────────────────────────── -->

  </main>

  <footer class="border-t border-stone-200">
    <div class="max-w-5xl mx-auto px-6 py-8 flex justify-between items-center text-xs text-stone-300 font-light">
      <span>© 2026 Valen Wei</span>
      <span>Made with care</span>
    </div>
  </footer>

</body>
</html>
