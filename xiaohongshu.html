<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小红书 · Valen Wei</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      overflow: hidden;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
    }

    .qr-wrap {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 48px 56px;
    }

    .divider {
      width: 1px;
      height: 240px;
      background: rgba(255,255,255,0.1);
    }

    .qr-frame {
      padding: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(200,240,96,0.08), 0 0 120px rgba(200,240,96,0.04);
    }
    .qr-frame img {
      display: block;
      width: 500px;
      height: 500px;
      object-fit: contain;
    }

    .label {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      letter-spacing: 0.22em;
      font-weight: 300;
    }

    .offer-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      cursor: pointer;
    }
    .offer-tag {
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.85);
      transition: color 0.3s;
    }
    .offer-url {
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #eef890;
      transition: color 0.3s;
    }
    .offer-arrow {
      font-size: 20px;
      color: rgba(255,255,255,0.25);
      margin-top: 8px;
      transition: color 0.3s, transform 0.3s;
      display: inline-block;
    }
    .offer-link:hover .offer-tag  { color: #eef890; }
    .offer-link:hover .offer-url  { color: rgba(238,248,144,0.5); }
    .offer-link:hover .offer-arrow { color: #eef890; transform: translateX(4px); }

    .back {
      position: fixed;
      bottom: 24px;
      right: 28px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.22);
      text-decoration: none;
      transition: color 0.3s;
    }
    .back:hover { color: rgba(255,255,255,0.85); }
  </style>
</head>
<body>

  <div class="qr-wrap">
    <!-- Left: Xiaohongshu QR code -->
    <div class="card">
      <div class="qr-frame">
        <img src="home/xiaohongshu.jpg" alt="小红书二维码" />
      </div>
    </div>

  </div>

  <a href="journey.html" class="back">← back</a>

</body>
</html>
