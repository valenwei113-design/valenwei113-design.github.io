<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Coding · Journey · Valen Wei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    .accent { color: #a87c58; }
    .accent-bg { background-color: #a87c58; }
    .accent-border { border-color: #d6ae8e; }

    .photo-slot {
      background-color: #e7e2dc;
      overflow: hidden;
      position: relative;
      cursor: zoom-in;
    }
    .photo-slot img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .photo-slot:hover img { transform: scale(1.04); }

    .pull-quote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.5;
      color: #a87c58;
      letter-spacing: 0.01em;
    }

    .chapter-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }

    .prose-body {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.9;
      color: #44403c;
    }

    #lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #lightbox.open { opacity: 1; pointer-events: all; }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; box-shadow: 0 8px 48px rgba(0,0,0,0.5); }
    #lightbox-close {
      position: absolute; top: 24px; right: 28px;
      color: rgba(255,255,255,0.5); font-size: 28px; font-weight: 300;
      cursor: pointer; line-height: 1; transition: color 0.2s; user-select: none;
    }
    #lightbox-close:hover { color: #fff; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { opacity: 0; animation: fadeUp 0.8s ease forwards; }

    .kicker {
      font-size: 11px; font-weight: 700; letter-spacing: 0.24em;
      text-transform: uppercase; color: #a87c58; opacity: 0.7;
    }
    .sec-num {
      font-size: 12px; font-weight: 800; letter-spacing: 0.2em;
      color: #a87c58; opacity: 0.5;
    }
    .sec-title {
      font-size: clamp(32px, 4.5vw, 48px); font-weight: 900;
      letter-spacing: -0.025em; line-height: 1.08; color: #1a1a1a;
    }
    .body-sm {
      font-size: 15.5px; font-weight: 400; line-height: 1.75; color: #44403c;
    }
    .body-xs {
      font-size: 14px; font-weight: 400; line-height: 1.7; color: #44403c;
    }
    .rule { height: 1px; background: rgba(168,124,88,0.22); margin-bottom: 80px; }
    .hl-box {
      background: #fff; border-radius: 6px; padding: 32px 28px;
      border-top: 4px solid #a87c58;
    }
    .tip-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid rgba(168,124,88,0.12);
    }
    .tip-row:last-child { border-bottom: none; }
    .tip-n {
      font-size: 11px; font-weight: 700; color: #a87c58; opacity: 0.55;
      flex-shrink: 0; padding-top: 2px;
    }
  </style>
</head>
<body class="bg-stone-50 text-stone-800">

  <main class="max-w-5xl mx-auto px-6 pt-28 pb-32">

    <!-- Hero header -->
    <div class="mb-20 fade-up" style="animation-delay:0.1s;">

      <h1 style="font-family:'Playfair Display',serif; font-size:clamp(72px,9vw,120px); font-weight:900; line-height:1.08; letter-spacing:-0.01em; color:#1a1a1a;">
        web<br>application
      </h1>

    </div>

    <!-- Divider -->
    <div class="border-t border-stone-200 mb-20"></div>


    <!-- ── Offer Coming ── -->
    <section class="mb-20 fade-up" style="animation-delay:0.35s;">
      <div style="display:flex; align-items:baseline; gap:10px; margin-bottom:12px;">
        <span class="sec-num">01</span>
        <h2 class="sec-title" style="font-size:clamp(24px,3vw,36px);">Offer Coming</h2>
      </div>
      <!-- Link -->
      <div style="margin-bottom:20px;">
        <a href="http://172.23.46.133:8000" target="_blank" rel="noopener"
           style="display:inline-flex; align-items:center; gap:8px; font-size:18px; font-weight:500; color:#a87c58; text-decoration:none; letter-spacing:0.04em; border-bottom:1px solid rgba(168,124,88,0.3); padding-bottom:2px; transition:border-color 0.2s;"
           onmouseover="this.style.borderColor='rgba(168,124,88,0.8)'"
           onmouseout="this.style.borderColor='rgba(168,124,88,0.3)'">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;">
            <path d="M7 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1V9M10 2h4m0 0v4m0-4L7 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          http://172.23.46.133:8000/
        </a>
      </div>

      <!-- Screenshot grid 2×3 -->
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <div>
          <div class="photo-slot" style="border-radius:6px; aspect-ratio:4/3;">
            <img src="offer%20coming/1.png" alt="求职仪表盘" />
          </div>
          <p class="body-xs" style="color:#a8a29e; font-size:11px; letter-spacing:0.08em; margin-top:6px;">求职仪表盘</p>
        </div>
        <div>
          <div class="photo-slot" style="border-radius:6px; aspect-ratio:4/3;">
            <img src="offer%20coming/2.png" alt="简历匹配分析" />
          </div>
          <p class="body-xs" style="color:#a8a29e; font-size:11px; letter-spacing:0.08em; margin-top:6px;">简历匹配分析</p>
        </div>
        <div>
          <div class="photo-slot" style="border-radius:6px; aspect-ratio:4/3;">
            <img src="offer%20coming/3.png" alt="AI 优化简历" />
          </div>
          <p class="body-xs" style="color:#a8a29e; font-size:11px; letter-spacing:0.08em; margin-top:6px;">AI 优化简历</p>
        </div>
        <div>
          <div class="photo-slot" style="border-radius:6px; aspect-ratio:4/3;">
            <img src="offer%20coming/4.png" alt="申请追踪器" />
          </div>
          <p class="body-xs" style="color:#a8a29e; font-size:11px; letter-spacing:0.08em; margin-top:6px;">申请追踪器</p>
        </div>
        <div>
          <div class="photo-slot" style="border-radius:6px; aspect-ratio:4/3;">
            <img src="offer%20coming/5.png" alt="宇宙鼓励" />
          </div>
          <p class="body-xs" style="color:#a8a29e; font-size:11px; letter-spacing:0.08em; margin-top:6px;">宇宙鼓励</p>
        </div>
        <div>
          <div class="photo-slot" style="border-radius:6px; aspect-ratio:4/3;">
            <img src="offer%20coming/6.png" alt="AI 数据查询" />
          </div>
          <p class="body-xs" style="color:#a8a29e; font-size:11px; letter-spacing:0.08em; margin-top:6px;">AI 数据查询</p>
        </div>
      </div>

    </section>


  </main>

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox()">
    <span id="lightbox-close" onclick="closeLightbox()">×</span>
    <button id="lightbox-prev" onclick="event.stopPropagation(); navigateLightbox(-1)" style="position:absolute; left:24px; top:50%; transform:translateY(-50%); background:none; border:none; color:rgba(255,255,255,0.5); font-size:36px; font-weight:300; cursor:pointer; line-height:1; padding:8px; transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">‹</button>
    <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
    <button id="lightbox-next" onclick="event.stopPropagation(); navigateLightbox(1)" style="position:absolute; right:24px; top:50%; transform:translateY(-50%); background:none; border:none; color:rgba(255,255,255,0.5); font-size:36px; font-weight:300; cursor:pointer; line-height:1; padding:8px; transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">›</button>
    <div id="lightbox-counter" style="position:absolute; bottom:24px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.4); font-size:12px; letter-spacing:0.16em;"></div>
  </div>

  <footer style="background:#1a1a1a; border-top:2px solid #a87c58;">
    <div style="max-width:1080px; margin:0 auto; padding:20px 32px; display:flex; justify-content:space-between; align-items:center;">
      <a href="journey.html" style="display:flex; align-items:center; gap:8px; font-size:9.5px; font-weight:800; letter-spacing:0.24em; text-transform:uppercase; color:#fff; text-decoration:none;">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to Journey
      </a>
      <span style="font-size:9.5px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; opacity:0.3; color:#fff;">© 2026 Valen Wei</span>
    </div>
  </footer>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCounter = document.getElementById('lightbox-counter');

    let images = [];
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      lightboxImg.src = images[currentIndex];
      lightboxCounter.textContent = (currentIndex + 1) + ' / ' + images.length;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function navigateLightbox(dir) {
      currentIndex = (currentIndex + dir + images.length) % images.length;
      lightboxImg.src = images[currentIndex];
      lightboxCounter.textContent = (currentIndex + 1) + ' / ' + images.length;
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.photo-slot img').forEach((img, i) => {
      images.push(img.src);
      img.addEventListener('click', () => {
        if (!img.src || img.src === window.location.href) return;
        openLightbox(i);
      });
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') navigateLightbox(1);
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
    });
  </script>
</body>
</html>
