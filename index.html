<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valen Wei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }

    .fade-up {
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.8s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .nav-link {
      display: block;
      text-align: right;
      letter-spacing: 0.1em;
      transition: letter-spacing 0.4s ease, color 0.3s ease, opacity 0.3s ease;
    }
    .nav-link:hover {
      letter-spacing: 0.24em;
      opacity: 1 !important;
    }
    .nav-group:hover .nav-link:not(:hover) {
      opacity: 0.3;
    }

    @keyframes fadeBlur {
      from { opacity: 0; filter: blur(6px); letter-spacing: 0.18em; }
      to   { opacity: 1; filter: blur(0);   letter-spacing: 0.04em; }
    }
    .fade-blur {
      opacity: 0;
      animation: fadeBlur 1.4s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes nameReveal {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .name-reveal {
      opacity: 0;
      animation: nameReveal 1s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    #music-btn {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 50;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #music-btn:hover {
      border-color: rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.4);
    }
    #music-btn.playing #vinyl {
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #music-label {
      position: fixed;
      bottom: 30px;
      left: 68px;
      z-index: 50;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      pointer-events: none;
    }
    #music-label.visible { opacity: 1; }
  </style>
</head>
<body class="bg-black h-screen overflow-hidden">

  <main class="relative h-screen w-full overflow-hidden">

    <!-- Full-screen video backgrounds -->
    <video id="bg-vid-0" autoplay muted playsinline
           class="absolute inset-0 w-full h-full object-cover transition-opacity duration-[1500ms]" style="opacity:1;">
      <source src="home/iceland.mov" type="video/mp4" />
    </video>
    <video id="bg-vid-1" muted playsinline
           class="absolute inset-0 w-full h-full object-cover transition-opacity duration-[1500ms]" style="opacity:0;">
      <source src="home/norway.mov" type="video/mp4" />
    </video>
    <video id="bg-vid-2" muted playsinline
           class="absolute inset-0 w-full h-full object-cover transition-opacity duration-[1500ms]" style="opacity:0;">
      <source src="home/Manta.mov" type="video/mp4" />
    </video>
    <video id="bg-vid-3" muted playsinline
           class="absolute inset-0 w-full h-full object-cover transition-opacity duration-[1500ms]" style="opacity:0;">
      <source src="home/diving.mov" type="video/mp4" />
    </video>


    <!-- Gradient overlays -->
    <div class="absolute inset-0 pointer-events-none" style="background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%); z-index:1;"></div>
    <div class="absolute inset-0 pointer-events-none" style="background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 35%); z-index:1;"></div>

    <!-- Quote — top left -->
    <p class="fade-blur absolute top-9 left-10 text-white/50 text-2xl"
       style="font-family:'Great Vibes',cursive; animation-delay:0.9s; z-index:2;">Courage is fear walking</p>

    <!-- Corner nav — bottom right -->
    <nav id="corner-nav"
         style="position:fixed; bottom:22px; right:24px; z-index:20; text-align:right; opacity:0.2; transition:opacity 0.4s ease; font-family:'Cormorant Garamond',serif;"
         onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.2'">
      <div style="display:flex; flex-direction:column; gap:7px;">
        <a href="vlog.html"  style="font-size:13px; letter-spacing:0.1em; color:#fff; text-decoration:none;">Vlog</a>
        <a href="story.html" style="font-size:13px; letter-spacing:0.1em; color:#fff; text-decoration:none;">Journey</a>
      </div>
    </nav>

    <!-- Bottom left: identity -->
    <div class="absolute left-10 flex flex-col" style="bottom: 72px; z-index:3;">
      <h1 class="name-reveal text-white font-normal"
          style="font-family:'Playfair Display',serif; font-size:clamp(26px,3.5vw,46px); letter-spacing:0.18em; animation-delay:0.35s;">
        VALEN WEI
      </h1>
      <p class="name-reveal text-white/40 font-light text-xs mt-2"
         style="letter-spacing:0.32em; animation-delay:0.55s;">
        LIVING SLOWLY &nbsp;·&nbsp; MOVING FREELY
      </p>
    </div>


  </main>

  <!-- Background music -->
  <audio id="bg-music" loop preload="auto">
    <source src="home/Ellie Goulding-How Long Will I Love You.mp3" type="audio/mpeg" />
  </audio>

  <button id="music-btn" onclick="toggleMusic()" title="Toggle music">
    <svg id="vinyl" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="8" cy="8" r="7" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <circle cx="8" cy="8" r="2.5" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <circle cx="8" cy="8" r="1" fill="rgba(255,255,255,0.5)"/>
    </svg>
  </button>
  <span id="music-label">How Long Will I Love You — Ellie Goulding</span>

  <script>
    // Video slideshow — each video plays to end then switches to next
    const videos = [0, 1, 2, 3].map(i => document.getElementById('bg-vid-' + i));
    let curIdx = 0;

    function showVideo(idx) {
      videos.forEach((v, i) => { v.style.opacity = i === idx ? '1' : '0'; });
      videos[idx].play().catch(() => {});
      videos[idx].onended = () => {
        curIdx = (curIdx + 1) % videos.length;
        showVideo(curIdx);
      };
    }

    showVideo(0);

    // Music
    const audio = document.getElementById('bg-music');
    const btn   = document.getElementById('music-btn');
    const label = document.getElementById('music-label');

    audio.volume = 0.35;

    window.addEventListener('load', () => {
      audio.play().then(() => {
        btn.classList.add('playing');
        label.classList.add('visible');
        setTimeout(() => label.classList.remove('visible'), 3000);
      }).catch(() => {
        document.addEventListener('click', () => {
          audio.play();
          btn.classList.add('playing');
        }, { once: true });
      });
    });

    function toggleMusic() {
      if (audio.paused) {
        audio.play();
        btn.classList.add('playing');
        label.classList.add('visible');
        setTimeout(() => label.classList.remove('visible'), 3000);
      } else {
        audio.pause();
        btn.classList.remove('playing');
        label.classList.remove('visible');
      }
    }
  </script>
</body>
</html>
